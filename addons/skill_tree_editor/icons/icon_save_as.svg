<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <g transform="scale(1.5)">
    <!-- Identical floppy disk to icon_save.svg -->
    <rect x="0.5" y="0.5" width="14"   height="14"  rx="1"   fill="#85c1e9"/>
    <rect x="2.5" y="0.5" width="8.5"  height="5.5" fill="#3d89bf"/>
    <rect x="3.5" y="1.5" width="4"    height="4"   rx="0.3" fill="#b8ddf7"/>
    <rect x="2"   y="9"   width="11.5" height="5"   rx="0.5" fill="#ddeeff"/>

    <!-- Pencil: eraser top-right → tip bottom-left, fully inside floppy bounds -->
    <!-- Anchor (8.5,6.5) rotate(45): eraser cap corner reaches (14.16,3.67) and (11.33,0.84) -->
    <g transform="translate(8.5, 6.5) rotate(45)">
      <rect x="-2" y="-6"   width="4" height="1.5" rx="0.4" fill="#e07070"/>
      <rect x="-2" y="-4.5" width="4" height="1"               fill="#bbbbbb"/>
      <rect x="-2" y="-3.5" width="4" height="6"   rx="0.3" fill="#f5c030"/>
      <polygon points="-2,2.5 2,2.5 0,5.5"                   fill="#d4aa60"/>
      <polygon points="-0.7,4.5 0.7,4.5 0,5.5"               fill="#777"/>
    </g>
  </g>
</svg>
